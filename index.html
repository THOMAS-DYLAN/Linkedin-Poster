<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Bot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230077B5'/><text x='50' y='70' font-size='58' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='700'>Li</text></svg>">
  <link rel="shortcut icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --card:    #1c1c1c;
      --border:  #2a2a2a;
      --text:    #f0f0f0;
      --muted:   #666;
      --blue:    #3b82f6;
      --green:   #22c55e;
      --amber:   #f59e0b;
      --red:     #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* busy: disable pointer events on all interactive elements */
    [data-busy] .btn:not([disabled]),
    [data-busy] .icon-btn { pointer-events: none; opacity: 0.45; }

    /* ── header ─────────────────────────────────────────── */
    .hdr {
      position: sticky; top: 0; z-index: 20;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 13px 22px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .hdr-title { font-size: 15px; font-weight: 700; }
    .hdr-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .hdr-right { display: flex; align-items: center; gap: 10px; }

    /* ── badges ─────────────────────────────────────────── */
    .badge {
      font-size: 10px; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; padding: 3px 9px; border-radius: 100px;
    }
    .b-pending  { background: rgba(245,158,11,.12); color: var(--amber); }
    .b-approved { background: rgba(34,197,94,.12);  color: var(--green); }
    .b-sent     { background: rgba(102,102,102,.15); color: var(--muted); }
    .b-dirty    { background: rgba(59,130,246,.12);  color: var(--blue); }

    /* ── buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      border: none; border-radius: 7px; padding: 7px 13px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: filter .15s, transform .1s; white-space: nowrap; font-family: inherit;
    }
    .btn:hover:not([disabled]) { filter: brightness(1.12); }
    .btn:active:not([disabled]) { transform: scale(.97); }
    .btn[disabled] { opacity: .4; cursor: default; }

    .btn-primary { background: var(--blue);  color: #fff; }
    .btn-success { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .btn-ghost   { background: rgba(255,255,255,.05); color: var(--text);   border: 1px solid var(--border); }
    .btn-warn    { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }
    .btn-danger  { background: rgba(239,68,68,.1);  color: var(--red);   border: 1px solid rgba(239,68,68,.25); }
    .btn-save    { background: rgba(59,130,246,.15); color: var(--blue);  border: 1px solid rgba(59,130,246,.3); }

    .icon-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 7px 10px; font-size: 15px; border-radius: 7px; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .icon-btn:hover { border-color: #555; color: var(--text); }

    /* ── layout ─────────────────────────────────────────── */
    .main { max-width: 1120px; margin: 0 auto; padding: 24px 20px 60px; }

    /* ── state boxes ─────────────────────────────────────── */
    .state-box {
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    .state-box h2 { font-size: 20px; color: var(--text); margin-bottom: 10px; }
    .state-box p  { font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .state-box .big-btn { font-size: 14px; padding: 11px 24px; }

    /* ── topic card ─────────────────────────────────────── */
    .topic-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 20px; margin-bottom: 18px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    }
    .tc-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 3px; }
    .tc-title { font-size: 15px; font-weight: 700; }
    .tc-desc  { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .topic-card a { font-size: 13px; color: var(--blue); text-decoration: none; flex-shrink: 0; }
    .topic-card a:hover { text-decoration: underline; }

    /* ── posts grid ─────────────────────────────────────── */
    .posts-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 18px;
    }
    @media(max-width:700px) { .posts-grid { grid-template-columns: 1fr; } }

    /* ── post card ──────────────────────────────────────── */
    .post-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      display: flex; flex-direction: column; transition: border-color .2s;
    }
    .post-card.pc-approved { border-color: rgba(34,197,94,.3); }
    .post-card.pc-sent     { border-color: rgba(102,102,102,.25); }
    .post-card.pc-dirty    { border-color: rgba(59,130,246,.35); }

    .pc-hdr {
      padding: 11px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .pc-day   { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
    .pc-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* editable textarea replaces static text */
    .pc-textarea {
      flex: 1; width: 100%; min-height: 160px;
      background: transparent; border: none; outline: none;
      color: #ccc; font-size: 13px; line-height: 1.75; font-family: inherit;
      padding: 14px; resize: none; overflow: hidden;
    }
    .pc-textarea:focus { color: var(--text); background: rgba(255,255,255,.015); }

    .pc-meta {
      padding: 4px 14px 8px;
      display: flex; align-items: center; justify-content: flex-end;
    }
    .pc-chars { font-size: 10px; color: var(--muted); }
    .pc-chars.long { color: var(--amber); }
    .pc-chars.over { color: var(--red); }

    .pc-actions {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    /* save button hidden by default, shown only when card is dirty */
    .pc-actions .btn-save { display: none; }
    .post-card.pc-dirty .pc-actions .btn-save { display: inline-flex; }

    /* ── footer bar ─────────────────────────────────────── */
    .footer-bar {
      border-top: 1px solid var(--border); padding-top: 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .footer-left  { display: flex; gap: 8px; }
    .footer-right { display: flex; gap: 8px; flex-wrap: wrap; }
    .footer-bar .btn { font-size: 12px; padding: 8px 14px; }

    /* ── toast ──────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      min-width: 210px; max-width: 350px;
      background: var(--card); border: 1px solid var(--border); border-radius: 9px;
      padding: 11px 16px; font-size: 13px; line-height: 1.5;
      box-shadow: 0 8px 28px rgba(0,0,0,.55); z-index: 300;
      transform: translateY(14px); opacity: 0; pointer-events: none;
      transition: transform .25s, opacity .25s;
    }
    #toast.show  { transform: translateY(0); opacity: 1; }
    #toast.t-ok  { border-color: rgba(34,197,94,.45);  color: var(--green); }
    #toast.t-err { border-color: rgba(239,68,68,.45);  color: var(--red); }
    #toast.t-inf { border-color: rgba(59,130,246,.45); color: var(--blue); }

    /* ── modal ──────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px; width: 90%; max-width: 400px;
    }
    .modal h3 { font-size: 15px; margin-bottom: 18px; }
    .modal label {
      display: block; font-size: 11px; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-bottom: 6px;
    }
    .modal input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); padding: 9px 12px;
      font-size: 13px; font-family: 'Courier New', monospace; outline: none; margin-bottom: 10px;
    }
    .modal input:focus { border-color: var(--blue); }
    .modal .hint { font-size: 12px; color: var(--muted); line-height: 1.65; margin-bottom: 18px; }
    .modal-foot { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-title">LinkedIn Bot</div>
    <div class="hdr-sub" id="week-sub">Loading…</div>
  </div>
  <div class="hdr-right">
    <span id="week-badge" style="display:none"></span>
    <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
  </div>
</header>

<div class="main">

  <!-- loading -->
  <div id="el-loading" class="state-box"><p>Loading…</p></div>

  <!-- empty state -->
  <div id="el-empty" class="state-box" style="display:none">
    <h2>No posts this week</h2>
    <p>Generate this week's topic, page, and three LinkedIn posts.</p>
    <button class="btn btn-primary big-btn" onclick="generateWeek()">Generate Week</button>
  </div>

  <!-- dashboard -->
  <div id="el-dash" style="display:none">
    <div class="topic-card" id="topic-card"></div>
    <div class="posts-grid" id="posts-grid"></div>

    <div class="footer-bar">
      <!-- danger zone -->
      <div class="footer-left">
        <button class="btn btn-danger" onclick="deleteWeek()">Delete Week</button>
      </div>
      <!-- week actions -->
      <div class="footer-right">
        <button class="btn btn-ghost"   onclick="newTopic()">New Topic</button>
        <button class="btn btn-warn"    onclick="regenerateAllPosts()">Regenerate All</button>
        <button class="btn btn-ghost"   id="btn-post-all-now" onclick="postAllNow()">Post All Now</button>
        <button class="btn btn-primary" id="btn-schedule"     onclick="scheduleAll()">Schedule All</button>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<!-- Settings modal -->
<div class="overlay" id="modal-settings">
  <div class="modal">
    <h3>Settings</h3>
    <label for="inp-token">GitHub Personal Access Token</label>
    <input type="password" id="inp-token" placeholder="ghp_…" autocomplete="off" />
    <p class="hint">
      Required for all actions that write or trigger workflows.<br>
      Token needs <strong>Contents: write</strong> + <strong>Actions: write</strong> permissions.<br>
      Saved only in this browser (localStorage).
    </p>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save Token</button>
    </div>
  </div>
</div>

<script>
// ── config ────────────────────────────────────────────────────────────────────
const { OWNER, REPO } = (() => {
  const h = window.location.hostname;
  const p = window.location.pathname.split('/').filter(Boolean);
  if (h.endsWith('.github.io')) return { OWNER: h.replace('.github.io', ''), REPO: p[0] || '' };
  return { OWNER: 'THOMAS-DYLAN', REPO: 'Linkedin-Poster' };
})();

const RAW = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/data/pending-week.json`;
const API = `https://api.github.com/repos/${OWNER}/${REPO}`;

const LABELS = {
  monday:    'Post 1 — Introduction',
  wednesday: 'Post 2 — Why businesses care',
  friday:    'Post 3 — Web dev tie-in',
};

// ── state ─────────────────────────────────────────────────────────────────────
let S   = null;   // pending-week.json object
let sha = null;   // file SHA for API commits
const dirty = new Set();  // days with unsaved textarea edits

// ── token ─────────────────────────────────────────────────────────────────────
const getToken = () => localStorage.getItem('lnbot_token') || '';
const hasToken = () => !!getToken();

// ── toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg, cls = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show' + (cls ? ' ' + cls : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => { el.className = ''; }, 5500);
}

// ── settings modal ────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('inp-token').value = getToken();
  document.getElementById('modal-settings').classList.add('open');
}
function closeSettings() {
  document.getElementById('modal-settings').classList.remove('open');
}
function saveSettings() {
  const v = document.getElementById('inp-token').value.trim();
  if (v) localStorage.setItem('lnbot_token', v);
  else   localStorage.removeItem('lnbot_token');
  closeSettings();
  toast('Token saved.', 't-ok');
}
document.getElementById('modal-settings').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSettings();
});
document.getElementById('inp-token').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveSettings();
});

// ── busy ──────────────────────────────────────────────────────────────────────
function busy(on) {
  if (on) document.body.setAttribute('data-busy', '1');
  else    document.body.removeAttribute('data-busy');
}

// ── GitHub helpers ────────────────────────────────────────────────────────────
async function ghFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      Authorization:  `token ${getToken()}`,
      Accept:         'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
    body: opts.body != null ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const j = await res.json().catch(() => ({}));
    throw new Error(j.message || `GitHub API error ${res.status}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

function b64enc(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => (bin += String.fromCharCode(b)));
  return btoa(bin);
}

async function ensureSha() {
  if (sha) return;
  const f = await ghFetch('/contents/data/pending-week.json');
  sha = f.sha;
}

async function commitS(msg) {
  await ensureSha();
  const r = await ghFetch('/contents/data/pending-week.json', {
    method: 'PUT',
    body: { message: msg, content: b64enc(JSON.stringify(S, null, 2)), sha, branch: 'main' },
  });
  sha = r.content.sha;
}

async function dispatch(file, inputs = {}) {
  await ghFetch(`/actions/workflows/${encodeURIComponent(file)}/dispatches`, {
    method: 'POST',
    body: { ref: 'main', inputs },
  });
}

// ── data ──────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(RAW + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    dirty.clear();
    sha = null;
    if (!data || !data.weekOf) { showEmpty(); return; }
    S = data;
    render();
  } catch (e) {
    document.getElementById('el-loading').innerHTML =
      `<p style="color:var(--red)">Failed to load: ${esc(e.message)}</p>`;
  }
}

// ── render ────────────────────────────────────────────────────────────────────
function showEmpty() {
  document.getElementById('el-loading').style.display = 'none';
  document.getElementById('el-dash').style.display    = 'none';
  document.getElementById('el-empty').style.display   = '';
  document.getElementById('week-sub').textContent     = 'No pending week';
  document.getElementById('week-badge').style.display = 'none';
}

function render() {
  document.getElementById('el-loading').style.display = 'none';
  document.getElementById('el-empty').style.display   = 'none';
  document.getElementById('el-dash').style.display    = '';

  const { weekOf, weekNumber, topic, pageUrl, posts, status } = S;

  // header
  document.getElementById('week-sub').textContent = `Week ${weekNumber || '—'} · ${weekOf}`;
  const wb = document.getElementById('week-badge');
  wb.style.display = '';
  if (status === 'approved') {
    wb.textContent = 'Approved'; wb.className = 'badge b-approved';
  } else {
    wb.textContent = 'Pending approval'; wb.className = 'badge b-pending';
  }

  // topic card
  document.getElementById('topic-card').innerHTML = `
    <div>
      <div class="tc-label">This week's page</div>
      <div class="tc-title">${esc(topic.title)}</div>
      <div class="tc-desc">${esc(topic.description)}</div>
    </div>
    <a href="${esc(pageUrl)}" target="_blank" rel="noopener noreferrer">View page →</a>
  `;

  // post cards
  const grid = document.getElementById('posts-grid');
  grid.innerHTML = '';
  ['monday', 'wednesday', 'friday'].forEach(day => {
    const post = posts.find(p => p.day === day);
    if (post) grid.appendChild(makeCard(post, status));
  });

  // footer schedule/revoke button
  const btn = document.getElementById('btn-schedule');
  const allSent = posts.every(p => p.sent);
  if (allSent) {
    btn.textContent = 'All Sent ✓'; btn.disabled = true; btn.className = 'btn btn-success';
  } else if (status === 'approved') {
    btn.textContent = 'Revoke Approval'; btn.disabled = false; btn.className = 'btn btn-warn';
    btn.onclick = revokeApproval;
  } else {
    btn.textContent = 'Schedule All'; btn.disabled = false; btn.className = 'btn btn-primary';
    btn.onclick = scheduleAll;
  }

  // post-all-now button
  const pan = document.getElementById('btn-post-all-now');
  pan.disabled = allSent;
}

function makeCard(post, weekStatus) {
  const { day, text, sent } = post;
  const approved = weekStatus === 'approved';
  const isDirty  = dirty.has(day);

  let cardCls = 'post-card';
  if (isDirty)        cardCls += ' pc-dirty';
  else if (sent)      cardCls += ' pc-sent';
  else if (approved)  cardCls += ' pc-approved';

  let badge;
  if (isDirty)         badge = `<span class="badge b-dirty">Edited</span>`;
  else if (sent)       badge = `<span class="badge b-sent">Sent</span>`;
  else if (approved)   badge = `<span class="badge b-approved">Scheduled</span>`;
  else                 badge = `<span class="badge b-pending">Pending</span>`;

  const n = text.length;
  const charCls = n > 3000 ? 'pc-chars over' : n > 1300 ? 'pc-chars long' : 'pc-chars';

  const el = document.createElement('div');
  el.className = cardCls;
  el.id = 'card-' + day;
  el.innerHTML = `
    <div class="pc-hdr">
      <div>
        <div class="pc-day">${esc(day)}</div>
        <div class="pc-label">${esc(LABELS[day] || '')}</div>
      </div>
      ${badge}
    </div>
    <textarea class="pc-textarea" id="ta-${day}"
              ${sent ? 'readonly' : ''}
              oninput="onEdit('${day}')">${esc(text)}</textarea>
    <div class="pc-meta">
      <span class="${charCls}" id="cc-${day}">${n} chars</span>
    </div>
    <div class="pc-actions">
      <button class="btn btn-save" onclick="savePost('${day}')">Save</button>
      <button class="btn btn-primary" onclick="postNow('${day}')" ${sent ? 'disabled' : ''}>
        ${sent ? 'Sent ✓' : 'Post Now'}
      </button>
      <button class="btn btn-ghost" onclick="regeneratePost('${day}')" ${sent ? 'disabled' : ''}>
        Regenerate
      </button>
    </div>
  `;

  // auto-resize textarea after insertion (next tick)
  setTimeout(() => autoSize(el.querySelector('textarea')), 0);
  return el;
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── textarea helpers ──────────────────────────────────────────────────────────
function autoSize(ta) {
  if (!ta) return;
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function onEdit(day) {
  const ta = document.getElementById('ta-' + day);
  const cc = document.getElementById('cc-' + day);
  const card = document.getElementById('card-' + day);
  if (!ta || !card) return;

  const n = ta.value.length;
  cc.textContent = n + ' chars';
  cc.className = n > 3000 ? 'pc-chars over' : n > 1300 ? 'pc-chars long' : 'pc-chars';

  const post = S.posts.find(p => p.day === day);
  const changed = post && ta.value !== post.text;

  if (changed) {
    dirty.add(day);
    card.classList.add('pc-dirty');
    card.classList.remove('pc-approved','pc-sent');
    card.querySelector('.pc-hdr .badge').textContent = 'Edited';
    card.querySelector('.pc-hdr .badge').className = 'badge b-dirty';
  } else {
    dirty.delete(day);
    card.classList.remove('pc-dirty');
    const sent = post && post.sent;
    if (sent) {
      card.classList.add('pc-sent');
      card.querySelector('.pc-hdr .badge').textContent = 'Sent';
      card.querySelector('.pc-hdr .badge').className = 'badge b-sent';
    } else if (S.status === 'approved') {
      card.classList.add('pc-approved');
      card.querySelector('.pc-hdr .badge').textContent = 'Scheduled';
      card.querySelector('.pc-hdr .badge').className = 'badge b-approved';
    } else {
      card.querySelector('.pc-hdr .badge').textContent = 'Pending';
      card.querySelector('.pc-hdr .badge').className = 'badge b-pending';
    }
  }

  autoSize(ta);
}

// ── targeted DOM helpers (avoid full re-render that wipes dirty textareas) ────
function updateCardState(day) {
  const card  = document.getElementById('card-' + day);
  if (!card) return;
  const isDirty = dirty.has(day);
  const post    = S.posts.find(p => p.day === day);
  const sent    = post && post.sent;
  const badge   = card.querySelector('.pc-hdr .badge');

  card.classList.remove('pc-dirty', 'pc-approved', 'pc-sent');

  if (isDirty) {
    card.classList.add('pc-dirty');
    if (badge) { badge.textContent = 'Edited'; badge.className = 'badge b-dirty'; }
  } else if (sent) {
    card.classList.add('pc-sent');
    if (badge) { badge.textContent = 'Sent'; badge.className = 'badge b-sent'; }
  } else if (S.status === 'approved') {
    card.classList.add('pc-approved');
    if (badge) { badge.textContent = 'Scheduled'; badge.className = 'badge b-approved'; }
  } else {
    if (badge) { badge.textContent = 'Pending'; badge.className = 'badge b-pending'; }
  }
}

function updateFooterBtn() {
  const btn    = document.getElementById('btn-schedule');
  const pan    = document.getElementById('btn-post-all-now');
  const allSent = S.posts.every(p => p.sent);
  if (allSent) {
    btn.textContent = 'All Sent ✓'; btn.disabled = true; btn.className = 'btn btn-success';
  } else if (S.status === 'approved') {
    btn.textContent = 'Revoke Approval'; btn.disabled = false; btn.className = 'btn btn-warn';
    btn.onclick = revokeApproval;
  } else {
    btn.textContent = 'Schedule All'; btn.disabled = false; btn.className = 'btn btn-primary';
    btn.onclick = scheduleAll;
  }
  if (pan) pan.disabled = allSent;

  const wb = document.getElementById('week-badge');
  if (S.status === 'approved') {
    wb.textContent = 'Approved'; wb.className = 'badge b-approved';
  } else {
    wb.textContent = 'Pending approval'; wb.className = 'badge b-pending';
  }
}

// ── require token ─────────────────────────────────────────────────────────────
function requireToken() {
  if (hasToken()) return true;
  openSettings();
  return false;
}

// ── per-post actions ──────────────────────────────────────────────────────────
async function savePost(day) {
  if (!requireToken()) return;
  const ta = document.getElementById('ta-' + day);
  if (!ta) return;
  const newText = ta.value;
  busy(true);
  try {
    const post = S.posts.find(p => p.day === day);
    post.text = newText;
    await commitS(`chore: edit ${day} post via dashboard`);
    dirty.delete(day);
    updateCardState(day);   // targeted update — preserves other dirty textareas
    toast(`${day} post saved.`, 't-ok');
  } catch (e) {
    toast('Save failed: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

async function postNow(day) {
  if (!requireToken()) return;
  const notApproved = S.status !== 'approved';
  const msg = notApproved
    ? `Post the ${day} post to LinkedIn right now?\n\nNote: this week isn't approved yet, but Post Now bypasses that.`
    : `Post the ${day} post to LinkedIn right now?`;
  if (!confirm(msg)) return;
  busy(true);
  try {
    await dispatch('post-now.yml', { day });
    toast(`Posting ${day} — refresh in ~30 s to see it marked Sent.`, 't-ok');
  } catch (e) {
    toast('Error: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

async function regeneratePost(day) {
  if (!requireToken()) return;
  if (!confirm(`Regenerate the ${day} post with Claude?\n\nRefresh in ~30 seconds to see the new version.`)) return;
  busy(true);
  try {
    await dispatch('regenerate-post.yml', { day });
    toast(`Regenerating ${day} — refresh in ~30 s.`, 't-ok');
  } catch (e) {
    toast('Error: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

// ── week actions ──────────────────────────────────────────────────────────────
async function scheduleAll() {
  if (!requireToken()) return;
  if (!confirm(`Approve all three posts for week of ${S.weekOf}?\n\nThey'll go out Mon / Wed / Fri at 9 AM.`)) return;
  const prev = S.status;
  busy(true);
  try {
    S.status = 'approved'; S.approvedAt = new Date().toISOString(); S.approvedVia = 'dashboard';
    await commitS('chore: approved via dashboard');
    // targeted update — does not rebuild textareas, preserving any dirty edits
    ['monday', 'wednesday', 'friday'].forEach(updateCardState);
    updateFooterBtn();
    toast('Scheduled — posts go out Mon / Wed / Fri at 9 AM.', 't-ok');
  } catch (e) {
    S.status = prev; delete S.approvedAt; delete S.approvedVia;
    ['monday', 'wednesday', 'friday'].forEach(updateCardState);
    updateFooterBtn();
    toast('Error: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

async function revokeApproval() {
  if (!requireToken()) return;
  if (!confirm('Revoke the approval for this week?\n\nPosts will not go out until you re-approve.')) return;
  busy(true);
  try {
    S.status = 'pending'; delete S.approvedAt; delete S.approvedVia;
    await commitS('chore: revoked approval via dashboard');
    // targeted update — does not rebuild textareas, preserving any dirty edits
    ['monday', 'wednesday', 'friday'].forEach(updateCardState);
    updateFooterBtn();
    toast('Approval revoked.', 't-inf');
  } catch (e) {
    toast('Error: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

async function postAllNow() {
  if (!requireToken()) return;
  const unsentCount = S.posts.filter(p => !p.sent).length;
  if (!confirm(`Post all ${unsentCount} unsent post(s) to LinkedIn right now?\n\nThis cannot be undone.`)) return;
  busy(true);
  try {
    await dispatch('post-all-now.yml');
    toast('Posting all now — refresh in ~1 minute to see them marked Sent.', 't-ok');
  } catch (e) {
    toast('Error: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

async function regenerateAllPosts() {
  if (!requireToken()) return;
  if (!confirm('Regenerate all three post texts with Claude?\n\nThe topic and page stay the same. Refresh in ~30 seconds.')) return;
  busy(true);
  try {
    await dispatch('regenerate-all-posts.yml');
    toast('Regenerating all posts — refresh in ~30 s.', 't-ok');
  } catch (e) {
    toast('Error: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

async function newTopic() {
  if (!requireToken()) return;
  if (!confirm('Generate a brand-new topic and three new posts?\n\nThis overwrites everything for this week. Refresh in ~2 minutes.')) return;
  busy(true);
  try {
    await dispatch('generate-week.yml');
    toast('Generating new topic and posts — refresh in ~2 min.', 't-ok');
  } catch (e) {
    toast('Error: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

async function generateWeek() {
  if (!requireToken()) return;
  busy(true);
  try {
    await dispatch('generate-week.yml');
    toast('Generating this week\'s content — refresh in ~2 minutes.', 't-ok');
  } catch (e) {
    toast('Error: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

async function deleteWeek() {
  if (!requireToken()) return;
  if (!confirm('Delete all pending content for this week?\n\nThis clears the data file. You\'ll need to generate a new week afterwards.')) return;
  if (!confirm('Are you sure? This cannot be undone.')) return;
  busy(true);
  try {
    await ensureSha();
    const r = await ghFetch('/contents/data/pending-week.json', {
      method: 'PUT',
      body: { message: 'chore: clear pending week via dashboard', content: b64enc('{}'), sha, branch: 'main' },
    });
    sha = r.content.sha;
    S = null; dirty.clear();
    showEmpty();
    toast('Week cleared.', 't-inf');
  } catch (e) {
    toast('Error: ' + e.message, 't-err');
  } finally {
    busy(false);
  }
}

// ── boot ──────────────────────────────────────────────────────────────────────
load();
</script>
