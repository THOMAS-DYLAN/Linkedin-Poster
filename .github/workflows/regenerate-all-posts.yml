name: Regenerate All Posts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Regenerate all post texts
        run: node src/regenerate-all-posts.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit regenerated posts
        run: |
          git config user.name "linkedin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/pending-week.json
          git diff --staged --quiet || (git pull --rebase && git commit -m "chore: regenerated all posts $(date +%Y-%m-%d)" && git push)
