name: Check Approval

# Runs every hour, Monday through Friday.
# Looks for an "approved" reply to the draft email.
# Updates pending-week.json and commits the change if approval is found.
on:
  schedule:
    - cron: '0 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check Gmail for approval reply
        run: node src/check-approval.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit approval status if changed
        run: |
          git config user.name "linkedin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/pending-week.json
          git diff --staged --quiet || (git pull --rebase && git commit -m "chore: approval received $(date +%Y-%m-%d)" && git push)
