name: Post All Now

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Post Monday
        run: node src/post-today.js
        env:
          POST_DAY_OVERRIDE: monday
          POST_FORCE: '1'
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}

      - name: Post Wednesday
        run: node src/post-today.js
        env:
          POST_DAY_OVERRIDE: wednesday
          POST_FORCE: '1'
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}

      - name: Post Friday
        run: node src/post-today.js
        env:
          POST_DAY_OVERRIDE: friday
          POST_FORCE: '1'
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}

      - name: Commit sent status
        run: |
          git config user.name "linkedin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/pending-week.json
          git diff --staged --quiet || (git pull --rebase && git commit -m "chore: posted all posts $(date +%Y-%m-%d)" && git push)
